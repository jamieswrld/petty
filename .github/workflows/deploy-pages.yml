name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          NEXT_PUBLIC_SOLANA_RPC: ${{ vars.NEXT_PUBLIC_SOLANA_RPC || 'https://api.mainnet-beta.solana.com' }}
          NEXT_PUBLIC_PETANA_MINT: ${{ vars.NEXT_PUBLIC_PETANA_MINT || '2mtF9f6XJ98S7hqGiwWUZzvd63Vtq1NT1oPqawFTpump' }}
          NEXT_PUBLIC_TREASURY_WALLET: ${{ vars.NEXT_PUBLIC_TREASURY_WALLET || '' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

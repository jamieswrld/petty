name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Static export (no server API on GitHub Pages)
        run: rm -rf src/app/api

      - run: yarn build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SOLANA_RPC: ${{ vars.NEXT_PUBLIC_SOLANA_RPC || 'https://api.mainnet-beta.solana.com' }}
          NEXT_PUBLIC_PETGOTCHI_MINT: ${{ vars.NEXT_PUBLIC_PETGOTCHI_MINT || vars.NEXT_PUBLIC_PETANA_MINT || '2mtF9f6XJ98S7hqGiwWUZzvd63Vtq1NT1oPqawFTpump' }}
          NEXT_PUBLIC_TREASURY_WALLET: ${{ vars.NEXT_PUBLIC_TREASURY_WALLET || '' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}

      - name: GitHub Pages SPA fallback
        run: cp out/index.html out/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

# Deploy full Next.js app (with claim API) on Render: https://render.com
# Point playpetana.com here for on-chain claims + HTTPS
services:
  - type: web
    name: petana
    runtime: node
    region: oregon
    plan: free
    buildCommand: yarn install --frozen-lockfile && yarn build
    startCommand: yarn start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SOLANA_RPC
        sync: false
      - key: NEXT_PUBLIC_PETANA_MINT
        sync: false
      - key: NEXT_PUBLIC_TREASURY_WALLET
        sync: false
      - key: TREASURY_PRIVATE_KEY
        sync: false
      - key: PETANA_TOKEN_DECIMALS
        value: "6"
      - key: TREASURY_ADMIN_SECRET
        sync: false
      - key: CLAIM_TEST_MODE
        value: "true"

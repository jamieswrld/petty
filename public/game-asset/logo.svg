<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- petgotchi: pixel P Tamagotchi, transparent background -->
  <g fill="#E8877E" stroke="#3D3530" stroke-width="2" stroke-linejoin="round">
    <!-- P stem -->
    <rect x="10" y="10" width="14" height="44" fill="#E8877E"/>
    <!-- P top bar -->
    <rect x="24" y="10" width="22" height="14" fill="#E8877E"/>
    <!-- P middle bar -->
    <rect x="24" y="24" width="22" height="14" fill="#E8877E"/>
    <!-- P bowl right edge (pixel steps) -->
    <rect x="46" y="10" width="8" height="8" fill="#E8877E"/>
    <rect x="46" y="18" width="8" height="8" fill="#E8877E"/>
    <rect x="46" y="26" width="8" height="6" fill="#E8877E"/>
  </g>
  <!-- Outline accents -->
  <g fill="#3D3530">
    <rect x="8" y="8" width="4" height="48"/>
    <rect x="8" y="8" width="18" height="4"/>
    <rect x="22" y="8" width="4" height="18"/>
    <rect x="22" y="22" width="26" height="4"/>
    <rect x="44" y="8" width="4" height="12"/>
    <rect x="48" y="8" width="8" height="4"/>
    <rect x="52" y="12" width="4" height="8"/>
    <rect x="52" y="20" width="4" height="8"/>
    <rect x="48" y="28" width="8" height="4"/>
    <rect x="22" y="36" width="26" height="4"/>
    <rect x="8" y="52" width="18" height="4"/>
  </g>
  <!-- Heart inside P -->
  <g fill="#E8877E">
    <rect x="30" y="30" width="4" height="2"/>
    <rect x="38" y="30" width="4" height="2"/>
    <rect x="28" y="32" width="4" height="2"/>
    <rect x="32" y="32" width="8" height="2"/>
    <rect x="40" y="32" width="4" height="2"/>
    <rect x="28" y="34" width="16" height="2"/>
    <rect x="30" y="36" width="12" height="2"/>
    <rect x="32" y="38" width="8" height="2"/>
    <rect x="34" y="40" width="4" height="2"/>
  </g>
  <g fill="#3D3530">
    <rect x="28" y="28" width="2" height="6"/>
    <rect x="42" y="28" width="2" height="6"/>
    <rect x="26" y="30" width="2" height="12"/>
    <rect x="44" y="30" width="2" height="12"/>
    <rect x="28" y="42" width="2" height="2"/>
    <rect x="42" y="42" width="2" height="2"/>
    <rect x="30" y="44" width="2" height="2"/>
    <rect x="40" y="44" width="2" height="2"/>
    <rect x="32" y="46" width="8" height="2"/>
  </g>
</svg>
